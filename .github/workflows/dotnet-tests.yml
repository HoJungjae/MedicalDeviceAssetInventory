name: BDD Test Automation CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    # Tier 1: Run smoke tests first — fastest feedback on critical paths
    - name: Run Smoke Tests (Tier 1 - Critical Path)
      run: dotnet test --no-build --verbosity normal --filter "Category=SmokeTest"

    # Tier 2: Run full BDD test suite
    - name: Run Full BDD Test Suite (Tier 2 - All Scenarios)
      run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    # Publish test results for traceability (IEC 62304 audit readiness)
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: BDD Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: true
